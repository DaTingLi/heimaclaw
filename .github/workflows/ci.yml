name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy: matrix
    
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install -e ".[test]"
          pip install -e ".[firecracker]"
      
      - name: Run linter
        run: |
          pip install ruff
          ruff check src/heimaclaw
      
      - name: Run type checker
        run: |
          pip install mypy
          mypy src/heimaclaw
      
      - name: Run tests (Core)
        run: |
          python -m pytest tests/ -v
      
      - name: Run Event Bus tests
        run: |
          python -m pytest tests/core/ -v
      
      - name: Generate coverage
        run: |
          pip install pytest-cov
          pytest --cov=tests/ --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v1
        with:
          file: ./coverage.xml
          flags: --fail-check=0

  # Documentation
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Build documentation
        run: |
          pip install mkdocs-material
          mkdocs build
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-mdbook@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site

  # Deploy to PyPI
  pypi:
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - uses: actions/checkout@ 3
      - uses: actions/setup-python@4
        with:
          python-version: '3.10'
      - name: Build package
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        run: |
          pip install twine
          twine upload dist/*
