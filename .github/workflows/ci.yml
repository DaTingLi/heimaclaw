# HeiMaClaw CI/CD 工作流
# 自动执行 lint、测试、构建、发布

name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # Lint 检查
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 安装 ruff
        run: pip install ruff
      
      - name: 运行 ruff 检查
        run: ruff check src/ tests/
      
      - name: 运行 ruff 格式检查
        run: ruff format --check src/ tests/

  # 类型检查
  typecheck:
    name: 类型检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 安装依赖
        run: |
          pip install -e ".[dev]"
      
      - name: 运行 mypy
        run: mypy src/
        continue-on-error: true

  # 单元测试
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 安装依赖
        run: |
          pip install -e ".[dev]"
      
      - name: 运行测试
        run: |
          pytest tests/ -v --cov=src/heimaclaw --cov-report=xml --cov-report=term-missing
      
      - name: 上传覆盖率报告
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
        continue-on-error: true

  # 构建 wheel
  build:
    name: 构建 wheel
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' || github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 安装构建工具
        run: pip install build
      
      - name: 构建 wheel
        run: python -m build
      
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # 发布到 PyPI（仅在 Release 时）
  publish-pypi:
    name: 发布到 PyPI
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/heimaclaw
    permissions:
      id-token: write
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      
      - name: 发布到 PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # 发布到 GitHub Releases
  publish-github:
    name: 发布到 GitHub Releases
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'release'
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      
      - name: 上传到 Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
