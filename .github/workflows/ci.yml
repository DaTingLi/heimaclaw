name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install aiofiles pydantic pytest pytest-asyncio
      
      - name: Run linter
        run: |
          pip install ruff
          ruff check src/heimaclaw || true
      
      - name: Run type checker
        run: |
          pip install mypy
          mypy src/heimaclaw || true
      
      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short
      
      - name: Run Event Bus tests
        run: |
          python -m pytest tests/core/ -v
      
      - name: Generate coverage
        run: |
          pip install pytest-cov
          pytest --cov=src/heimaclaw --cov-report=xml tests/ || true
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Run ruff
        run: |
          pip install ruff
          ruff check src/heimaclaw
        continue-on-error: true
